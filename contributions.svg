<svg width="480" height="150" viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-start { stop-color: #e8f4fc; }
    .bg-end { stop-color: #f0e6fa; }
    .title-text { fill: #1a1a2e; }
    .card-text { fill: #a0a3b1; }

    @media (prefers-color-scheme: dark) {
      .bg-start { stop-color: #1a1b26; }
      .bg-end { stop-color: #24283b; }
      .title-text { fill: #c0caf5; }
      .card-text { fill: #565f89; }
    }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="bg-start"/>
      <stop offset="100%" class="bg-end"/>
    </linearGradient>
  </defs>
  <rect width="480" height="150" fill="url(#bgGrad)" rx="16"/>
  <text class="title-text" x="30" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    Open-Source Contributions
  </text>
  <text class="card-text" x="240" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">
    No contributions yet. Start contributing
  </text>
</svg>